<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }} | {{ site.tagline }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description | strip_html | truncate: 160 }}"/>
  <meta name="keywords" content="{{ site.keywords }}"/>
  <meta property="og:title" content="{{ page.title | default: site.title }}"/>
  <meta property="og:description" content="{{ page.description | default: site.description | strip_html | truncate: 160 }}"/>
  <meta property="og:type" content="website"/>
  <meta property="og:url" content="{{ site.url }}{{ page.url }}"/>
  <meta name="theme-color" content="#0f1117"/>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "{{ site.author.name }}",
    "jobTitle": "{{ site.author.title }}",
    "description": "{{ site.description | strip_newlines }}",
    "url": "{{ site.url }}",
    "image": "https://github.com/{{ site.author.github }}.png",
    "email": "{{ site.author.email }}",
    "sameAs": [
      "https://www.linkedin.com/in/{{ site.author.linkedin }}/",
      "https://github.com/{{ site.author.github }}",
      "https://medium.com/{{ site.author.medium }}",
      "https://substack.com/{{ site.author.substack }}",
      "https://www.youtube.com/{{ site.author.youtube }}"
    ],
    "knowsAbout": ["Apache Airflow","Data Engineering","Generative AI","RAG","LLMs","Python","Kubernetes","dbt","Snowflake","LangChain","MLOps"],
    "worksFor": {"@type": "Organization","name": "{{ site.author.company }}"},
    "award": ["Astronomer Champion for Apache Airflow","5x Apache Airflow Certified","AWS Certified Cloud Practitioner"]
  }
  </script>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  {% seo %}
</head>
<body>
  {{ content }}
</body>
</html>
