---
layout: null
permalink: /gallery/
---
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gallery — {{ site.author.name }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/assets/css/style.css"/>
  <script>
    const _t = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    document.documentElement.setAttribute('data-theme', _t);
  </script>
  <style>
    .pg-nav {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; gap: 1rem; padding: 0.6rem 1.4rem;
      background: var(--bg); border-bottom: 1px solid var(--border);
    }
    .pg-nav-back { font-family: var(--mono); font-size: 0.65rem; font-weight: 600; color: var(--accent-n); text-decoration: none; transition: opacity 0.15s; }
    .pg-nav-back:hover { opacity: 0.7; }
    .pg-nav-title { font-family: var(--mono); font-size: 0.65rem; color: var(--text-muted); }

    .pg-main { max-width: 960px; margin: 0 auto; padding: 2rem 1.25rem 3rem; }
    .pg-intro { text-align: center; margin-bottom: 2rem; }
    .pg-intro-title { font-family: 'Caveat', cursive; font-size: 2rem; color: var(--heading); }
    .pg-intro-sub { font-family: 'Caveat', cursive; font-size: 1.1rem; color: var(--text-muted); margin-top: 0.25rem; }

    /* ── GRID ── */
    .pg-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1.75rem;
    }

    /* ── FLIP CARD ── */
    .flip-card { perspective: 1100px; cursor: pointer; }
    .flip-card-inner {
      position: relative; width: 100%;
      transform-style: preserve-3d;
      transition: transform 0.75s cubic-bezier(0.4, 0.2, 0.2, 1);
    }
    .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }

    /* FRONT — natural height, no cropping */
    .flip-front {
      border-radius: 6px; overflow: hidden;
      backface-visibility: hidden; -webkit-backface-visibility: hidden;
    }
    .flip-front img { width: 100%; height: auto; display: block; }

    /* BACK — absolute, covers the same area as front */
    .flip-back {
      position: absolute; inset: 0;
      border-radius: 6px; overflow: hidden;
      backface-visibility: hidden; -webkit-backface-visibility: hidden;
      transform: rotateY(180deg);
      background: #fdf6e8;
      display: flex; flex-direction: column; justify-content: center;
      padding: 1.4rem 1.4rem 2rem;
      box-shadow: inset 0 0 40px rgba(180,140,80,0.08);
    }
    /* ruled lines */
    .flip-back::before {
      content: '';
      position: absolute; inset: 0;
      background: repeating-linear-gradient(
        transparent 0px, transparent 29px,
        rgba(100,140,200,0.18) 29px, rgba(100,140,200,0.18) 30px
      );
      top: 44px; border-radius: 6px; pointer-events: none;
    }
    /* red margin line */
    .flip-back::after {
      content: '';
      position: absolute; top: 0; bottom: 0; left: 2.4rem;
      width: 1px; background: rgba(220,80,80,0.3); pointer-events: none;
    }
    .flip-cat {
      font-family: 'Caveat', cursive; font-size: 0.95rem;
      color: #a0835a; position: relative; z-index: 1;
      margin-bottom: 0.35rem;
    }
    .flip-title {
      font-family: 'Caveat', cursive; font-size: 1.45rem; font-weight: 700;
      color: #2a1a0e; line-height: 1.35; position: relative; z-index: 1;
      margin-bottom: 0.5rem;
    }
    .flip-sub {
      font-family: 'Caveat', cursive; font-size: 1.05rem;
      color: #5c4030; line-height: 1.6; position: relative; z-index: 1;
    }

    @media (max-width: 600px) {
      .pg-grid { grid-template-columns: 1fr 1fr; gap: 1.1rem; }
      .flip-title { font-size: 1.15rem; }
      .flip-sub { font-size: 0.88rem; }
    }
    @media (max-width: 380px) {
      .pg-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="pg-nav">
  <a class="pg-nav-back" href="/?view=normal">← Portfolio</a>
  <span class="pg-nav-title">🖼️ Gallery</span>
</div>

<div class="pg-main">
  <div class="pg-intro">
    <div class="pg-intro-title">Memories</div>
    <div class="pg-intro-sub">tap a photo to flip it ✦</div>
  </div>

  <div class="pg-grid">
    {% for photo in site.data.gallery %}
    <div class="flip-card" onclick="this.classList.toggle('flipped')">
      <div class="flip-card-inner">
        <div class="flip-front">
          <img src="/assets/images/gallery/{{ photo.file }}" alt="{{ photo.alt | default: photo.title }}">
        </div>
        <div class="flip-back">
          <div class="flip-cat">{{ photo.cat }}</div>
          <div class="flip-title">{{ photo.title }}</div>
          <div class="flip-sub">{{ photo.sub }}</div>

        </div>
      </div>
    </div>
    {% endfor %}
  </div>
</div>

<script>
const _s = localStorage.getItem('theme');
if (_s) document.documentElement.setAttribute('data-theme', _s);
</script>
</body>
</html>
