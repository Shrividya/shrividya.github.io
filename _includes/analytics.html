<section class="analytics-wrap" aria-labelledby="github-heading">
  <h2 id="github-heading">GitHub Analytics</h2>

  <div class="stats-row">
    <img
      src="https://github-readme-stats-tau-nine-15.vercel.app/api?username={{ site.author.github }}&show_icons=true&theme=merko&hide_border=true&bg_color=0a0e17&title_color=a8cc00&icon_color=a8cc00&text_color=ffffff&count_private=true&include_all_commits=true"
      alt="GitHub stats" loading="lazy"
    />
    <img
      src="https://github-readme-stats-tau-nine-15.vercel.app/api/top-langs?username={{ site.author.github }}&layout=compact&theme=merko&hide_border=true&bg_color=0a0e17&title_color=a8cc00&text_color=ffffff"
      alt="Top languages" loading="lazy"
    />
  </div>

  <div style="margin-bottom:1.25rem;">
    <img
      src="https://github-readme-streak-stats-xi-topaz.vercel.app?user={{ site.author.github }}&theme=merko&hide_border=true&background=0a0e17&ring=a8cc00&fire=a8cc00&currStreakLabel=a8cc00"
      alt="GitHub streak" loading="lazy"
    />
  </div>

  <div>
    <img src="https://github-trophies.vercel.app/?username={{ site.author.github }}" alt="GitHub trophies" loading="lazy"/>
  </div>
</section>
